{% extends "base.html" %}

{% block content %}
<div class="row">
    <div class="col-12">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0"><i class="fas fa-chart-bar me-2"></i>System Statistics</h4>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-4 mb-4">
                        <div class="stat-card">
                            <i class="fas fa-users fa-2x text-primary"></i>
                            <h3>{{ total_users }}</h3>
                            <p>Total Users</p>
                        </div>
                    </div>
                    <div class="col-md-4 mb-4">
                        <div class="stat-card">
                            <i class="fas fa-clipboard-list fa-2x text-success"></i>
                            <h3>{{ total_responses }}</h3>
                            <p>Total Responses</p>
                        </div>
                    </div>
                    <div class="col-md-4 mb-4">
                        <div class="stat-card">
                            <i class="fas fa-chart-line fa-2x text-info"></i>
                            <h3>{{ "%.1f"|format(avg_score) }}</h3>
                            <p>Average Score</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
